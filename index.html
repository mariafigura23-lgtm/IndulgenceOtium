<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{--ink:#2A201A;--ink-soft:#6A5946;--oxblood:#5E0F1B;--oxblood-2:#7A1722;--gold:#9C7B2E;--gold-bright:#BD9846;--gold-pale:#E7D4A4;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Cormorant Garamond',Georgia,serif;color:var(--ink);line-height:1.5;
    background:radial-gradient(120% 80% at 50% -20%, rgba(189,152,70,.16), transparent 60%),radial-gradient(circle at 85% 90%, rgba(94,15,27,.18), transparent 55%),linear-gradient(#1A120C,#0F0A07);
    min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 56px;}
  .stage{width:100%;max-width:640px;}
  .langbar{display:flex;justify-content:center;gap:8px;margin-bottom:20px;}
  .langbtn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:var(--gold-pale);background:transparent;border:1px solid rgba(189,152,70,.45);padding:7px 17px;border-radius:1px;cursor:pointer;transition:.16s;}
  .langbtn:hover{border-color:var(--gold-bright);color:#fff;}.langbtn.active{background:var(--gold-bright);color:#16100A;border-color:var(--gold-bright);}

  .parchment{position:relative;overflow:hidden;background:radial-gradient(ellipse at 30% 12%, rgba(255,252,245,.72), transparent 62%),radial-gradient(ellipse at 82% 92%, rgba(150,110,60,.16), transparent 55%),linear-gradient(165deg,#F7F0E2,#EBDEC4);
    border:1px solid #d3bd92;box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 44px 90px -34px rgba(0,0,0,.82);padding:52px 44px 44px;}
  .edge-1,.edge-2{position:absolute;pointer-events:none;}
  .edge-1{top:14px;right:14px;bottom:14px;left:14px;border:1px solid var(--gold);opacity:.65;}
  .edge-2{top:18px;right:18px;bottom:18px;left:18px;border:.5px solid var(--oxblood);opacity:.45;}
  .corner{position:absolute;width:26px;height:26px;color:var(--gold);z-index:3;}
  .corner.tl{top:9px;left:9px;}.corner.tr{top:9px;right:9px;transform:scaleX(-1);}.corner.bl{bottom:9px;left:9px;transform:scaleY(-1);}.corner.br{bottom:9px;right:9px;transform:scale(-1,-1);}
  .watermark{position:absolute;top:56%;left:50%;transform:translate(-50%,-50%);width:64%;max-width:340px;color:var(--oxblood);opacity:.05;z-index:0;pointer-events:none;}
  .content{position:relative;z-index:2;}

  .eyebrow{text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--oxblood);margin-bottom:14px;}
  .latin-head{text-align:center;font-family:'Cinzel',serif;font-weight:600;font-size:clamp(15px,4vw,19px);letter-spacing:.3em;text-transform:uppercase;color:var(--oxblood);margin-bottom:4px;}
  .title{font-family:'Playfair Display',Georgia,serif;font-weight:800;text-align:center;font-size:clamp(33px,8.6vw,56px);letter-spacing:-.01em;line-height:1.02;color:var(--ink);margin:2px 0 6px;}
  .title.two small{display:block;font-family:'Playfair Display',serif;font-weight:700;font-size:.62em;color:var(--ink);letter-spacing:-.01em;}
  .sublatin{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:var(--ink-soft);}
  .order{text-align:center;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--oxblood);margin-top:8px;}
  .cert-sub2{text-align:center;font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-soft);margin-top:4px;}
  .lede{text-align:center;font-size:19px;color:var(--ink-soft);max-width:460px;margin:18px auto 22px;font-weight:500;}
  .diamond{display:flex;align-items:center;justify-content:center;gap:14px;color:var(--gold-bright);margin:16px 0;}
  .diamond::before,.diamond::after{content:"";height:1px;width:74px;background:linear-gradient(90deg,transparent,var(--gold-bright));}
  .diamond::after{background:linear-gradient(90deg,var(--gold-bright),transparent);}
  .diamond i{width:8px;height:8px;background:var(--gold-bright);transform:rotate(45deg);}

  #quizView{display:block;}
  .quiz-list{display:flex;flex-direction:column;gap:9px;margin:20px 0 8px;}
  .sin{display:flex;align-items:center;gap:13px;text-align:left;cursor:pointer;width:100%;padding:13px 16px;border:1px solid #d0ba8e;border-radius:2px;background:rgba(255,253,247,.4);font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;color:var(--ink);transition:.15s;}
  .sin:hover{border-color:var(--oxblood);background:rgba(255,253,247,.85);}
  .sin .box{flex:0 0 auto;width:22px;height:22px;border:1px solid var(--oxblood);border-radius:1px;display:flex;align-items:center;justify-content:center;color:var(--gold-pale);font-size:12px;}
  .quiz-div{height:1px;margin:5px 16px;background:linear-gradient(90deg,transparent,rgba(189,152,70,.55),transparent);}
  .sin .box::after{content:"✦";opacity:0;transition:.12s;}.sin.sel{background:rgba(94,15,27,.09);border-color:var(--oxblood);}.sin.sel .box{background:var(--oxblood);}.sin.sel .box::after{opacity:1;}
  .counter{text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;color:var(--ink-soft);min-height:15px;margin:8px 0 4px;}
  .field{margin-top:18px;}
  .field label{display:block;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--oxblood);margin-bottom:7px;}
  .field input{width:100%;padding:14px 16px;font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--ink);background:rgba(255,253,247,.6);border:1px solid #d0ba8e;border-radius:1px;outline:none;transition:.18s;}
  .field input:focus{border-color:var(--oxblood);box-shadow:0 0 0 3px rgba(94,15,27,.1);background:#fffdf7;}
  .btn{display:block;width:100%;margin-top:20px;cursor:pointer;font-family:'Cinzel',serif;font-weight:600;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:#F6ECD6;padding:17px;border:none;border-radius:1px;background:linear-gradient(180deg,var(--oxblood-2),var(--oxblood));box-shadow:0 10px 24px -9px rgba(94,15,27,.9),0 0 0 1px var(--gold) inset;transition:transform .12s,box-shadow .12s;}
  .btn:hover{transform:translateY(-2px);}.btn:active{transform:translateY(0);}
  .fine{text-align:center;font-size:16px;color:var(--ink-soft);margin-top:16px;font-style:italic;opacity:.85;}
  .err{color:var(--oxblood);font-size:16px;margin-top:8px;min-height:18px;font-style:italic;text-align:center;}

  #certView{display:none;}#certView.show{display:block;}
  .cert-doc{text-align:center;}
  .crest{display:flex;justify-content:center;color:var(--gold-bright);margin-bottom:6px;}
  .crest svg{width:94px;height:auto;}
  .intro{text-align:center;max-width:440px;margin:6px auto 0;font-size:19px;color:var(--ink);font-weight:500;}
  .cert-body{font-size:19px;color:var(--ink);font-weight:500;max-width:440px;margin-left:auto;margin-right:auto;}
  .name-wrap{margin:14px 0 6px;}
  .cert-name{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(30px,8vw,46px);color:var(--oxblood);line-height:1.06;}
  .rank-emblem{display:flex;justify-content:center;color:var(--gold-bright);margin:8px 0 2px;}
  .rank-emblem svg{width:56px;height:56px;}
  .rankbadge{display:inline-block;font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--oxblood);border:1px solid var(--gold-bright);border-radius:2px;padding:8px 18px;margin:6px 0 8px;background:rgba(189,152,70,.10);}
  .typeline{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--oxblood);margin-top:4px;}
  .typeline b{color:var(--ink);}
  .typedesc{font-style:italic;font-size:16px;color:var(--ink-soft);max-width:430px;margin:4px auto 8px;text-align:center;}
  /* additional explanatory paragraphs after type */
  .typedesc2{font-style:italic;font-size:16px;color:var(--ink-soft);max-width:460px;margin:4px auto 8px;text-align:center;}
  .ch{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--oxblood);margin:16px 0 6px;text-align:center;}
  .clist{text-align:left;max-width:440px;margin:6px auto 4px;}
  .clist li{list-style:none;padding:5px 0 5px 28px;position:relative;font-size:18px;font-weight:500;}
  .clist li::before{content:"✦";position:absolute;left:5px;color:var(--gold-bright);font-size:12px;top:8px;}

  /* Display the sins list inline with commas instead of separate lines */
  #sinList li{display:inline;padding:0 0 0 0;margin-right:4px;}
  #sinList li::before{display:none;}
  #sinList li::after{content:", ";}
  #sinList li:last-child::after{content:"";}
  /* plaque styling for sins list */
  .sins-plaque{background:rgba(255,253,247,.65);border:1px solid #d3bd92;padding:10px;border-radius:4px;margin:10px auto;text-align:left;max-width:440px;line-height:1.3;}
  .sins-plaque li{font-size:14px;color:var(--ink);} 
  .frieze{display:flex;align-items:center;justify-content:center;gap:18px;color:var(--gold);margin:18px 0 4px;}
  .frieze svg{width:30px;height:30px;}.frieze .dot{width:3px;height:3px;border-radius:50%;background:var(--gold-bright);}
  .tri-h{font-family:'Playfair Display',serif;font-weight:700;font-style:italic;font-size:24px;color:var(--oxblood);text-align:center;margin-top:6px;}
  .tri-sub{font-style:italic;color:var(--ink-soft);font-size:16px;max-width:440px;margin:6px auto 10px;text-align:center;}
  .tri{max-width:430px;margin:8px auto 4px;text-align:left;}
  .tri-row{display:flex;gap:14px;align-items:baseline;padding:9px 2px;border-bottom:1px solid rgba(189,152,70,.28);}
  .tri-row:last-child{border-bottom:none;}
  .tri-cat{flex:0 0 120px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--oxblood);padding-top:2px;}
  .tri-act{font-size:18.5px;font-weight:500;color:var(--ink);}
  .tri-note{font-style:italic;color:var(--ink-soft);font-size:14px;text-align:center;margin-top:10px;opacity:.85;}
  .closing{text-align:center;font-style:italic;font-size:20px;color:var(--oxblood);max-width:420px;margin:16px auto 4px;}
  /* adjust seal and wax sizes */
  .seal-wrap{display:flex;justify-content:center;margin:24px 0 4px;}
  .wax{width:150px;height:auto;animation:stamp .8s cubic-bezier(.2,1.5,.4,1) both;}
  .wax-static{width:130px;height:auto;}
  #shareCardWrap{position:fixed;left:-10000px;top:0;width:600px;z-index:-1;}
  #shareCard .title{font-size:52px;}
  #shareCard .cert-name{font-size:46px;}
  #shareCard .latin-head{font-size:18px;}
  @keyframes stamp{0%{transform:scale(2.1) rotate(-13deg);opacity:0;}60%{opacity:1;}100%{transform:scale(1) rotate(-3deg);opacity:1;}}
  .sign{text-align:center;margin-top:8px;}
  .sign-name{font-family:'Playfair Display',serif;font-style:italic;font-size:26px;color:var(--oxblood);line-height:1;}
  .sign-cap{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-top:5px;}
  .issued{text-align:center;font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-top:12px;line-height:1.7;}
  .motto{text-align:center;font-style:italic;font-size:17px;color:var(--gold);margin-top:6px;}
  .brandline{text-align:center;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--oxblood);margin-top:12px;opacity:.9;}

  .actions{display:flex;gap:12px;margin-top:24px;}
  .cta,.cta2{flex:1;cursor:pointer;font-family:'Cinzel',serif;font-weight:600;font-size:13px;letter-spacing:.18em;text-transform:uppercase;padding:16px;border-radius:1px;transition:transform .12s;}
  .cta{border:none;color:#1A120C;background:linear-gradient(180deg,#D4AE5A,#BD9846);box-shadow:0 12px 26px -10px rgba(189,152,70,.7);}
  .cta:hover{transform:translateY(-2px);}
  .cta2{background:transparent;color:var(--gold-pale);border:1px solid rgba(189,152,70,.5);}
  .cta2:hover{transform:translateY(-2px);border-color:var(--gold-bright);}
  .textlink{display:block;margin:16px auto 0;background:none;border:none;color:var(--gold-pale);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;cursor:pointer;opacity:.85;}
  .textlink:hover{opacity:1;text-decoration:underline;}
  .subscribe{margin-top:30px;text-align:center;padding-top:24px;border-top:1px solid rgba(189,152,70,.25);}
  .sub-h{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:var(--gold-pale);margin-bottom:14px;}
  .sub-links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .sub-links a{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-pale);border:1px solid rgba(189,152,70,.5);padding:11px 18px;border-radius:1px;text-decoration:none;transition:.15s;}
  .sub-links a:hover{background:var(--gold-bright);color:#1A120C;border-color:var(--gold-bright);}
  .counter-line{margin-top:18px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(231,212,164,.65);min-height:14px;}

  .overlay{position:fixed;inset:0;background:rgba(16,11,7,.94);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px;}
  .overlay.show{display:flex;}
  .overlay img{max-width:100%;max-height:60vh;border-radius:4px;box-shadow:0 20px 50px rgba(0,0,0,.6);}
  .overlay p{color:#f0e6d2;font-size:16px;text-align:center;max-width:360px;}
  .overlay .ov-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .overlay a,.overlay button{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:12px 16px;border-radius:1px;text-decoration:none;cursor:pointer;border:none;}
  .overlay .tg{background:#2AABEE;color:#fff;}.overlay .ig{background:linear-gradient(45deg,#F58529,#DD2A7B,#8134AF);color:#fff;}.overlay .dl{background:var(--gold-bright);color:#231a10;}.overlay .cl{background:transparent;color:#f0e6d2;border:1px solid #8a7a60;}

  @media (max-width:520px){.parchment{padding:46px 22px 36px;}.wax{width:150px;}.crest svg{width:82px;}.actions{flex-direction:column;}.tri-cat{flex-basis:104px;}}
  @media (prefers-reduced-motion:reduce){.wax{animation:none;transform:rotate(-3deg);}.btn,.cta,.cta2{transition:none;}}
</style>
</head>
<body>
<div class="stage">
  <div class="langbar"><button class="langbtn active" data-lang="ru">RU</button><button class="langbtn" data-lang="en">EN</button></div>

  <!-- QUIZ + NAME -->
  <div class="parchment" id="quizView">
    <div class="edge-1"></div><div class="edge-2"></div>
    <svg class="corner tl" viewBox="0 0 26 26" fill="none"><path d="M3 25V9C3 5 5 3 9 3H25" stroke="currentColor" stroke-width="1.4"/><path d="M8 25V13c0-3 2-5 5-5h12" stroke="currentColor" stroke-width=".7"/></svg>
    <svg class="corner tr" viewBox="0 0 26 26" fill="none"><path d="M3 25V9C3 5 5 3 9 3H25" stroke="currentColor" stroke-width="1.4"/><path d="M8 25V13c0-3 2-5 5-5h12" stroke="currentColor" stroke-width=".7"/></svg>
    <svg class="corner bl" viewBox="0 0 26 26" fill="none"><path d="M3 25V9C3 5 5 3 9 3H25" stroke="currentColor" stroke-width="1.4"/><path d="M8 25V13c0-3 2-5 5-5h12" stroke="currentColor" stroke-width=".7"/></svg>
    <svg class="corner br" viewBox="0 0 26 26" fill="none"><path d="M3 25V9C3 5 5 3 9 3H25" stroke="currentColor" stroke-width="1.4"/><path d="M8 25V13c0-3 2-5 5-5h12" stroke="currentColor" stroke-width=".7"/></svg>
    <div class="content">
      <p class="eyebrow" data-i18n="q_eyebrow"></p>
      <h1 class="title two"><span data-i18n="q_title"></span><small data-i18n="q_title_small"></small></h1>
      <p class="sublatin">confiteor otium</p>
      <p class="lede" data-i18n="q_lede"></p>
      <div class="quiz-list" id="quizList"></div>
      <p class="counter" id="counter"></p>
      <div class="field"><label data-i18n="q_name_label"></label><input id="name" type="text" autocomplete="name" data-i18n-ph="q_name_ph"></div>
      <p class="err" id="quizErr"></p>
      <button class="btn" id="issueBtn" data-i18n="q_issue"></button>
      <p class="fine" data-i18n="q_fine"></p>
    </div>
  </div>

  <!-- CERTIFICATE -->
  <div id="certView">
    <div class="parchment" id="certCard">
      <div class="edge-1"></div><div class="edge-2"></div>
      <svg class="corner tl" viewBox="0 0 26 26" fill="none"><path d="M3 25V9C3 5 5 3 9 3H25" stroke="currentColor" stroke-width="1.4"/><path d="M8 25V13c0-3 2-5 5-5h12" stroke="currentColor" stroke-width=".7"/></svg>
      <svg class="corner tr" viewBox="0 0 26 26" fill="none"><path d="M3 25V9C3 5 5 3 9 3H25" stroke="currentColor" stroke-width="1.4"/><path d="M8 25V13c0-3 2-5 5-5h12" stroke="currentColor" stroke-width=".7"/></svg>
      <svg class="corner bl" viewBox="0 0 26 26" fill="none"><path d="M3 25V9C3 5 5 3 9 3H25" stroke="currentColor" stroke-width="1.4"/><path d="M8 25V13c0-3 2-5 5-5h12" stroke="currentColor" stroke-width=".7"/></svg>
      <svg class="corner br" viewBox="0 0 26 26" fill="none"><path d="M3 25V9C3 5 5 3 9 3H25" stroke="currentColor" stroke-width="1.4"/><path d="M8 25V13c0-3 2-5 5-5h12" stroke="currentColor" stroke-width=".7"/></svg>
      <svg class="watermark" viewBox="0 0 200 200">
        <g fill="none" stroke="currentColor" stroke-width="2"><circle cx="100" cy="100" r="94"/><circle cx="100" cy="100" r="82"/></g>
        <g fill="currentColor"><path d="M70 70 L78 50 L92 64 L100 44 L108 64 L122 50 L130 70 Z"/><rect x="70" y="70" width="60" height="6"/></g><g fill="none" stroke="currentColor" stroke-width="3"><path d="M64 82 H136 V120 C136 150 108 168 100 174 C92 168 64 150 64 120 Z"/><path d="M100 82 V174 M66 118 H134"/></g>
      </svg>
      <div class="content cert-doc" id="certDoc">
        <div class="crest">
          <svg viewBox="0 0 100 122" fill="none">
            <g fill="currentColor"><path d="M30 17 L34 6 L42 13 L50 3 L58 13 L66 6 L70 17 Z"/><rect x="30" y="16" width="40" height="3.4"/><circle cx="34" cy="5" r="2"/><circle cx="50" cy="2.4" r="2.2"/><circle cx="66" cy="5" r="2"/></g>
            <path d="M14 24 H86 V64 C86 92 60 108 50 113 C40 108 14 92 14 64 Z" fill="rgba(154,115,34,.10)" stroke="currentColor" stroke-width="2.2"/>
            <path d="M50 24 V108 M17 60 H83" stroke="currentColor" stroke-width="1"/>

    en:{

  let cur="ru"; const selected=new Set(); let state=null; let lastShareURL=null, lastShareFile=null, lastFullURL=null, lastName="indulgence";
  function rankIdx(n){ if(n<=2)return 0; if(n<=4)return 1; if(n<=6)return 2; if(n<=8)return 3; return 4; }
  function typeKey(indices){ const c={A:0,B:0,C:0,D:0}; indices.forEach(i=>{ const k=SINS[i].t; if(k)c[k]++; }); let max=0,best=[]; for(const k in c){ if(c[k]>max){max=c[k];best=[k];} else if(c[k]===max&&max>0){best.push(k);} } if(max===0)return 'E'; return best.length===1?best[0]:'E'; }
  function pickTri(pool,season){ const ok=[]; pool.forEach((o,i)=>{ if(o.s==='all'||o.s.includes(season)) ok.push(i); }); return ok.length?ok[rnd(ok.length)]:rnd(pool.length); }

  function buildQuiz(){ const list=$('#quizList'); list.innerHTML='';
    SINS.forEach((sn,i)=>{ const b=document.createElement('button'); b.type='button'; b.className='sin'+(selected.has(i)?' sel':''); b.dataset.i=i;
      b.innerHTML='<span class="box"></span><span>'+sinText(i)+'</span>';
      b.addEventListener('click',()=>{ if(selected.has(i)){selected.delete(i);b.classList.remove('sel');}else{selected.add(i);b.classList.add('sel');} $('#counter').textContent=I18N[cur].counter+selected.size; $('#quizErr').textContent=''; });
      list.appendChild(b);
      if((i+1)%4===0 && i<SINS.length-1){ const d=document.createElement('div'); d.className='quiz-div'; list.appendChild(d); }
    });
  }
  function buildSocial(){ const w=$('#subLinks'); w.innerHTML=''; SOCIAL.forEach(s=>{ const a=document.createElement('a'); a.href=s.url; a.target='_blank'; a.rel='noopener'; a.textContent=s.label; w.appendChild(a); }); }
  function fmtDate(d){ const t=I18N[cur]; return d.toLocaleDateString(t.date_locale,{day:'numeric',month:'long',year:'numeric'})+t.date_suffix; }

  function renderCert(){ if(!state)return; const t=I18N[cur];
    $('#certIntro1').textContent=t.c_intro1;
    $('#certName').textContent=state.name;
    $('#rankEmblem').innerHTML=RANK_EMBLEMS[rankIdx(state.indices.length)];
    $('#certRank').textContent=t.rank_label+t.ranks[rankIdx(state.indices.length)];
    const ty=t.types[state.type]; $('#certType').innerHTML=t.type_label+'<b>'+ty.n+'</b>'; $('#certTypeDesc').textContent=ty.d;
    // scientific explanation and helpful guidance, if present
    if(ty.why){ $('#certWhy').textContent = ty.why; } else { $('#certWhy').textContent = ''; }
    if(ty.help){ $('#certHelp').textContent = ty.help; } else { $('#certHelp').textContent = ''; }
    $('#serial').textContent=state.serial; $('#issueDate').textContent=fmtDate(state.dateObj);
    $('#sinList').innerHTML=state.indices.map(i=>'<li>'+sinText(i)+'</li>').join('');
    $('#remedyList').innerHTML=state.indices.map(i=>'<li>'+sinRem(i,state.remedy[i])+'</li>').join('');
    const rows=[[t.tri_body_label,t.triBody[state.tri.b][cur]],[t.tri_mind_label,t.triMind[state.tri.m][cur]],[t.tri_rest_label,t.triRest[state.tri.r][cur]]];
    $('#triBlock').innerHTML=rows.map(r=>'<div class="tri-row"><span class="tri-cat">'+r[0]+'</span><span class="tri-act">'+r[1]+'</span></div>').join('');
    $('#brandLine').textContent=BRAND_HANDLE;
    $('#sc_latin').textContent=t.c_latin_head; $('#sc_title').textContent=t.c_title; $('#sc_sublatin').textContent=t.c_sublatin; $('#sc_order').textContent=t.c_order;
    $('#sc_intro').textContent=t.c_intro1; $('#sc_name').textContent=state.name;
    $('#sc_rank').textContent=t.rank_label+t.ranks[rankIdx(state.indices.length)];
    $('#sc_type').innerHTML=t.type_label+'<b>'+ty.n+'</b>'; $('#sc_typedesc').textContent=ty.d;
    $('#sc_sealRing').textContent=t.seal_ring; $('#sc_sealMono').textContent=t.seal_mono; $('#sc_brand').textContent=BRAND_HANDLE;
  }
  function applyLang(lang){ cur=lang; const t=I18N[lang]; document.documentElement.lang=lang;
    document.querySelectorAll('[data-i18n]').forEach(el=>{ const k=el.dataset.i18n; if(t[k]!==undefined) el.textContent=t[k]; });
    document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ el.placeholder=t[el.dataset.i18nPh]; });
    $('#sealRing').textContent=t.seal_ring; $('#sealMono').textContent=t.seal_mono;
    buildQuiz(); $('#counter').textContent=t.counter+selected.size;
    document.querySelectorAll('.langbtn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
    if($('#certView').classList.contains('show')) renderCert();
  }

  async function snap(node){ await (document.fonts?document.fonts.ready:Promise.resolve()); await new Promise(r=>setTimeout(r,160)); const c=await html2canvas(node,{scale:2,backgroundColor:null,useCORS:true,logging:false}); return c.toDataURL('image/png'); }
  async function bumpCounter(){ if(!COUNTER_ENABLED) return; try{ const r=await fetch('https://abacus.jasoncameron.dev/hit/'+COUNTER_NS+'/'+COUNTER_KEY); const d=await r.json(); const n=d.value??d.count; if(typeof n==='number') $('#counterLine').textContent=I18N[cur].counter_label+n.toLocaleString(cur==='ru'?'ru-RU':'en-GB'); }catch(e){} }

  async function issue(){
    const t=I18N[cur]; const name=$('#name').value.trim();
    if(selected.size===0){ $('#quizErr').textContent=t.err_quiz; return; }
    if(!name){ $('#quizErr').textContent=t.err_name; return; }
    $('#quizErr').textContent='';
    const indices=[...selected]; const remedy={}; indices.forEach(i=>{ remedy[i]=rnd(SINS[i].rRu.length); });
    const season=seasonOf(new Date().getMonth()+1);
    const tri={ b:pickTri(I18N.ru.triBody,season), m:pickTri(I18N.ru.triMind,season), r:pickTri(I18N.ru.triRest,season) };
    state={ name, indices, remedy, tri, type:typeKey(indices), serial:String(Math.floor(100+Math.random()*900)), dateObj:new Date() };
    lastName=name.replace(/\s+/g,'_'); lastShareURL=null; lastShareFile=null; lastFullURL=null; renderCert();
    $('#quizView').style.display='none'; $('#certView').classList.add('show'); window.scrollTo({top:0,behavior:'smooth'});
    bumpCounter();
    try{ lastShareURL=await snap($('#shareCard')); const blob=await (await fetch(lastShareURL)).blob(); lastShareFile=new File([blob],'indulgenciya-'+lastName+'.png',{type:'image/png'}); }catch(e){ console.warn(e); }
  }
  function restart(){ $('#certView').classList.remove('show'); selected.clear(); buildQuiz(); $('#counter').textContent=I18N[cur].counter+'0'; $('#name').value=''; $('#quizErr').textContent=''; state=null; lastShareURL=null; lastShareFile=null; lastFullURL=null; $('#quizView').style.display='block'; window.scrollTo({top:0,behavior:'smooth'}); }

  function shareText(){ const t=I18N[cur]; if(!state)return ''; return t.share_text.replace('{rank}',t.ranks[rankIdx(state.indices.length)]); }
  function openShareOverlay(){ const t=I18N[cur]; $('#ovText').textContent=t.ov_text; $('#ovTg').textContent=t.ov_tg; $('#ovTg').style.display=''; $('#ovDownload').textContent=t.ov_dl; $('#ovClose').textContent=t.ov_close;
    if(lastShareURL){ $('#ovImg').src=lastShareURL; $('#ovDownload').href=lastShareURL; $('#ovDownload').setAttribute('download','indulgenciya-'+lastName+'.png'); }
    $('#ovTg').href='https://t.me/share/url?url='+encodeURIComponent(SITE_URL)+'&text='+encodeURIComponent(shareText());
    $('#overlay').classList.add('show');
  }
  async function shareCert(){
    try{ if(lastShareFile && navigator.canShare && navigator.canShare({files:[lastShareFile]})){ await navigator.share({ files:[lastShareFile], text:shareText() }); return; }
      if(navigator.share){ await navigator.share({ text:shareText(), url:SITE_URL }); return; } }
    catch(e){ if(e && e.name==='AbortError') return; }
    openShareOverlay();
  }
  async function saveCert(){ const btn=$('#downloadBtn'); btn.disabled=true; const old=btn.textContent; btn.textContent='…';
    try{ if(!lastFullURL){ lastFullURL=await snap($('#certCard')); }
      const fn='indulgenciya-polnaya-'+lastName+'.png';
      const a=document.createElement('a'); a.href=lastFullURL; a.download=fn; document.body.appendChild(a); a.click(); a.remove();
      const t=I18N[cur]; $('#ovText').textContent=t.ov_text; $('#ovImg').src=lastFullURL; $('#ovDownload').href=lastFullURL; $('#ovDownload').setAttribute('download',fn); $('#ovDownload').textContent=t.ov_dl; $('#ovClose').textContent=t.ov_close; $('#ovTg').style.display='none'; $('#overlay').classList.add('show');
    }catch(e){ console.error(e); alert('Could not render image / Не удалось подготовить картинку.'); } finally{ btn.disabled=false; btn.textContent=old; }
  }

  document.querySelectorAll('.langbtn').forEach(b=>b.addEventListener('click',()=>applyLang(b.dataset.lang)));
  $('#issueBtn').addEventListener('click',issue);
  $('#name').addEventListener('keydown',e=>{ if(e.key==='Enter') issue(); });
  $('#shareBtn').addEventListener('click',shareCert);
  $('#downloadBtn').addEventListener('click',saveCert);
  $('#againBtn').addEventListener('click',restart);
  $('#ovClose').addEventListener('click',()=>$('#overlay').classList.remove('show'));
  $('#overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') $('#overlay').classList.remove('show'); });
  buildSocial(); applyLang('ru');
</script>
